<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/template.css">
    <link rel="stylesheet" href="./index.style.css">
    <script src="../scripts/buttons.js" defer></script>
    <script src="./index.script.js" defer></script>
    <title>RaspiMC - MC</title>
</head>
<body>
    <div class="header">
        <div class="logo">
            <p class="title"><span class="raspi">Raspi</span><span class="mc">MC</span></p>
        </div>
        <div class="btns-header">
            <button class="mc-btn" id="mc-btn">MC</button>
            <button class="raspi-btn" id="raspi-btn">Raspi</button>
        </div>
    </div>

    <div class="main">
        <nav class="sidebar">
            <button class="mc-start" id="mc-start">Inicio</button>
            <button class="mc-config" id="mc-config">Configuración</button>
            <button class="mc-server" id="mc-server">Servidor</button>
        </nav>
        <div class="content">
            <h1>Bienvenido a RaspiMC</h1>
            <p>Esta es la página de inicio de RaspiMC. Aquí puedes encontrar información sobre cómo configurar y administrar tu servidor de Minecraft en una Raspberry Pi.</p>
        </div>
    </div>
</body>
</html>
