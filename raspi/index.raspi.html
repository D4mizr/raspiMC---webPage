<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/template.css">
    <link rel="stylesheet" href="./index.style.css">
    <script src="../scripts/ip.js" defer></script>
    <script src="../scripts/buttons.js" defer></script>
    <script src="./index.script.js" defer></script>
    <title>RaspiMC - Raspi</title>
</head>
<body>
    <div class="header">
        <div class="logo">
            <p class="title"><span class="raspi">Raspi</span><span class="mc">MC</span></p>
        </div>
        <div class="btns-header">
            <button class="mc-btn" id="mc-btn">MC</button>
            <button class="raspi-btn" id="raspi-btn">Raspi</button>
        </div>
    </div>
    <div class="main">
        <nav class="sidebar">
            <button class="raspi-start" id="raspi-start">Inicio</button>
            <button class="raspi-config" id="raspi-config">Configuración</button>
            <span class="ip" id="ip">Cargando...</span>
        </nav>

        <div class="content">
            <div class="sys-stats">
                <div class="title">
                    <h1>Estado</h1>
                </div>
                <div class="stat">
                    <div class="info">
                        <span>CPU</span>
                        <span id="cpu-text">0%</span>
                    </div>
                    <div class="progress">
                        <div id="cpu-bar" class="fill"></div>
                    </div>
                </div>
                <div class="stat">
                    <div class="info">
                        <span>RAM</span>
                        <span id="ram-text">0%</span>
                    </div>
                    <div class="progress">
                        <div id="ram-bar" class="fill"></div>
                    </div>
                </div>
            </div>
            <div class="wifi-stats">
                <h1>Wifi Status</h1>
                <span id="dot"></span>
                <span class="wifi-status" id="wifi-status">Cargando...</span>
                <h2>Local WiFi</h2>
                <span class="hostpotSSID" id="hostpotSSID">Cargando...</span> <br>
                <span class="hostpotPSW" id="hostpotPSW">Cargando...</span> <br>
            </div>
        </div>
    </div>
</body>
</html>
